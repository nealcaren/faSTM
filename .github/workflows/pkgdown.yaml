# Build the pkgdown site and deploy to GitHub Pages (gh-pages branch).
# Rust toolchain + cargo cache added (the generic pkgdown workflow omits Rust and
# would fail installing this extendr package).
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # No `environment: github-pages` — we deploy by pushing to the gh-pages
    # branch (JamesIves below), not via the github-pages environment. Once Pages
    # is set to "deploy from gh-pages branch", that environment gains a branch
    # policy that rejects this master-branch job at setup (fails in ~3s, 0 steps).
    permissions:
      contents: write
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> target"

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
