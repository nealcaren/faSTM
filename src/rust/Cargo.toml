[package]
name = "faSTM"
publish = false
version = "0.0.0"
edition = "2021"
rust-version = "1.65"

[lib]
crate-type = ["staticlib", "lib"]
name = "faSTM"

# Build-time wrapper generator (run by Makevars: `cargo run --bin document`).
[[bin]]
name = "document"
path = "document.rs"

[dependencies]
extendr-api = "0.7"

# The fitting core. STM = CTM + prevalence + content lives in topica::ctm::fit_ctm.
# Pinned to a tagged revision so the released package is reproducible; the pinned
# tag MUST be one that contains STM-SVI (topica #231 PR B) before faSTM ships an
# `inference="svi"` claim. default-features = false keeps the NumPy-free, no-JVM,
# no-pyo3 core only.
# Release pin (uncomment for distributable builds; must be a tag with STM-SVI):
# topica = { git = "https://github.com/nealcaren/topica", tag = "v0.23.1", default-features = false }
# Dev: build against the local working tree.
topica = { path = "../../../topica", default-features = false }

# Must match topica's lockfile so the `Rng` trait bound and the seed stream are
# byte-identical to topica's own STM fits (parity).
rand = "0.8"
rand_chacha = "0.3"

# Scoped thread pool for the parallel variational E-step (num_threads control).
rayon = "1"

# ---- Local development override -------------------------------------------
# Uncomment to build against a working tree instead of the pinned git rev:
# [patch."https://github.com/nealcaren/topica"]
# topica = { path = "../../../topica" }

[profile.release]
lto = true
codegen-units = 1
